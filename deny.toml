[graph]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Pre-publish only: the workspace root [patch.crates-io] points ordvec +
# ordvec-manifest at the 0.6.0 integration branch until they publish to
# crates.io. Removed with the patch block at publish (the release packaging
# script fails on any git source in Cargo.lock — see RELEASING.md).
allow-git = ["https://github.com/Project-Navi/ordvec"]
